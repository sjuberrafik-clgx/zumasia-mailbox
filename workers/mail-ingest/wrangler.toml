name = "zumasia-mail-ingest"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "zumasia-mail"
database_id = "12749b24-b21d-4f5d-bbca-89321113db93"

[[r2_buckets]]
binding = "EML_BUCKET"
bucket_name = "zumasia-mail-eml"

# Email routes are configured in the Cloudflare dashboard under
# Email Routing → Routes. Set the catch-all `*@zumasia.com` to forward
# to this worker. Reserved addresses (postmaster@, abuse@, etc.) should
# have their own specific rules that forward to your real mailbox.
